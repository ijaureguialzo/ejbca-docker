services:

  traefik:
    image: traefik:${TRAEFIK_VERSION:-3}
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard.rule=Host(`${FQDN_TRAEFIK:-traefik.ejbca.test}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard.service=api@internal"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard.tls=true"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-dashboard-redirect.redirectregex.regex=^https?://${FQDN_TRAEFIK:-traefik.ejbca.test}/(.*)"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-dashboard-redirect.redirectregex.replacement=https://${FQDN_TRAEFIK:-traefik.ejbca.test}/dashboard/$1"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard_redirect.rule=Host(`${FQDN_TRAEFIK:-traefik.ejbca.test}`) && !PathPrefix(`/api`) && !PathPrefix(`/dashboard`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard_redirect.middlewares=${COMPOSE_PROJECT_NAME}-dashboard-redirect"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard_redirect.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-dashboard_redirect.tls=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/certs:ro
    depends_on:
      - ejbca

  ejbca:
    image: keyfactor/ejbca-ce
    hostname: ejbca-docker
    environment:
      - TLS_SETUP_ENABLED=later
      - DATABASE_JDBC_URL=jdbc:mariadb://mariadb:3306/${EJBCA_DATABASE_NAME:-ejbca}?characterEncoding=UTF-8
      - DATABASE_USER=${EJBCA_DATABASE_USER:-ejbca}
      - DATABASE_PASSWORD=${EJBCA_DATABASE_PASSWORD:-12345Abcde}
      - TZ=Europe/Madrid
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ejbca.rule=Host(`${FQDN_EJBCA:-ejbca.test}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ejbca.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ejbca.tls=true"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-ejbca.loadbalancer.server.port=8443"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-ejbca.loadbalancer.server.scheme=https"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-ejbca.loadbalancer.serversTransport=forceInsecureTransport@file"
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:11.8
    environment:
      - MYSQL_ROOT_PASSWORD=${EJBCA_DATABASE_ROOT_PASSWORD:-12345Abcde}
      - MYSQL_DATABASE=${EJBCA_DATABASE_NAME:-ejbca}
      - MYSQL_USER=${EJBCA_DATABASE_USER:-ejbca}
      - MYSQL_PASSWORD=${EJBCA_DATABASE_PASSWORD:-12345Abcde}
    volumes:
      - mariadb:/var/lib/mysql

volumes:
  mariadb:
